<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apps - donaldgshelton-ux</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #f1f5f9;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1.5rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .card:hover {
            border-color: #475569;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }
        .card-color {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            margin-bottom: 1rem;
        }
        .card-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        .card-description {
            font-size: 0.875rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
            min-height: 2.5rem;
        }
        .card-links {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 140px;
            padding: 0.5rem 1rem;
            border: 1px solid #475569;
            border-radius: 0.375rem;
            background: transparent;
            color: #e2e8f0;
            text-decoration: none;
            text-align: center;
            font-size: 0.875rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn:hover {
            background: #334155;
            border-color: #64748b;
        }
        .btn-install {
            border-color: #3b82f6;
            color: #3b82f6;
        }
        .btn-install:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        .footer {
            text-align: center;
            color: #64748b;
            font-size: 0.875rem;
            margin-top: 2rem;
            border-top: 1px solid #334155;
            padding-top: 1rem;
        }
        .copy-feedback {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: #10b981;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Apps</h1>
        <p class="subtitle">Deployed PWA applications by donaldgshelton-ux</p>
        <div class="grid">
            <div class="card">
                <div class="card-color" style="background: #1f2937"></div>
                <div class="card-name">ENT Visit</div>
                <div class="card-description">ENT Visit</div>
                <div class="card-links">
                    <a href="https://donaldgshelton-ux.github.io/apps/ent-visit/" class="btn btn-install">Open</a>
                    <button class="btn" onclick="copyLink('https://donaldgshelton-ux.github.io/apps/ent-visit/')">Copy Link</button>
                </div>
            </div>
            <div class="card">
                <div class="card-color" style="background: #1f2937"></div>
                <div class="card-name">Medications</div>
                <div class="card-description">Medications</div>
                <div class="card-links">
                    <a href="https://donaldgshelton-ux.github.io/apps/medications/" class="btn btn-install">Open</a>
                    <button class="btn" onclick="copyLink('https://donaldgshelton-ux.github.io/apps/medications/')">Copy Link</button>
                </div>
            </div>
            <div class="card">
                <div class="card-color" style="background: #1f2937"></div>
                <div class="card-name">PWA Test</div>
                <div class="card-description">PWA Test</div>
                <div class="card-links">
                    <a href="https://donaldgshelton-ux.github.io/apps/pwa-test/" class="btn btn-install">Open</a>
                    <button class="btn" onclick="copyLink('https://donaldgshelton-ux.github.io/apps/pwa-test/')">Copy Link</button>
                </div>
            </div>
        </div>
    </div>

    <div class="copy-feedback" id="feedback">Copied to clipboard!</div>

    <script>
        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                const feedback = document.getElementById('feedback');
                feedback.style.display = 'block';
                setTimeout(() => feedback.style.display = 'none', 2000);
            });
        }
    </script>

    <footer class="footer">
        Generated 2026-04-15 19:27:46
        <br>Repo: <a href='https://github.com/donaldgshelton-ux/apps' style='color: #60a5fa; text-decoration: none;'>github.com/donaldgshelton-ux/apps</a>
    </footer>
</body>
</html>
